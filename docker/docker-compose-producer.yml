version: '3.8'

services:
  # Lightweight Mainnet Producer Node
  libre-mainnet-producer:
    build:
      context: .
      dockerfile: Dockerfile
    image: libre-node:5.0.3
    container_name: libre-mainnet-producer
    command: >
      nodeos
      --config-dir /opt/eosio/config
      --data-dir /opt/eosio/data
      --snapshot /opt/eosio/data/snapshot.bin
      --delete-all-blocks
      --delete-state-history
      --disable-replay-opts
    volumes:
      - ../mainnet/config:/opt/eosio/config
      - ../mainnet/data:/opt/eosio/data
      - ../mainnet/logs:/opt/eosio/logs
      # Use tmpfs for temporary state (RAM-based)
      - type: tmpfs
        target: /opt/eosio/data/blocks
        tmpfs:
          size: 2G
      - type: tmpfs
        target: /opt/eosio/data/state
        tmpfs:
          size: 4G
    network_mode: host
    restart: unless-stopped
    mem_limit: 8g
    memswap_limit: 8g
    cpu_shares: 2048
    environment:
      - PRODUCER_MODE=true
      - LIGHTWEIGHT=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9888/v1/chain/get_info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Lightweight Testnet Producer Node
  libre-testnet-producer:
    build:
      context: .
      dockerfile: Dockerfile
    image: libre-node:5.0.3
    container_name: libre-testnet-producer
    command: >
      nodeos
      --config-dir /opt/eosio/config
      --data-dir /opt/eosio/data
      --snapshot /opt/eosio/data/snapshot.bin
      --delete-all-blocks
      --delete-state-history
      --disable-replay-opts
    volumes:
      - ../testnet/config:/opt/eosio/config
      - ../testnet/data:/opt/eosio/data
      - ../testnet/logs:/opt/eosio/logs
      # Use tmpfs for temporary state (RAM-based)
      - type: tmpfs
        target: /opt/eosio/data/blocks
        tmpfs:
          size: 1G
      - type: tmpfs
        target: /opt/eosio/data/state
        tmpfs:
          size: 2G
    network_mode: host
    restart: unless-stopped
    mem_limit: 4g
    memswap_limit: 4g
    cpu_shares: 1024
    environment:
      - PRODUCER_MODE=true
      - LIGHTWEIGHT=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9889/v1/chain/get_info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s